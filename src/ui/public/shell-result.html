<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shell Result</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Mono',Menlo,Consolas,monospace;background:#0d1117;color:#c9d1d9;padding:12px;font-size:13px;line-height:1.6}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header h1{font-size:14px;font-weight:600;color:#f0f6fc;font-family:-apple-system,sans-serif}
.badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.ok{background:#1a3a2a;color:#3fb950}
.err{background:#3a1a1a;color:#f85149}
.section{margin-bottom:12px}
.section-title{font-size:12px;color:#8b949e;margin-bottom:4px;font-family:-apple-system,sans-serif}
pre{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;font-size:12px}
.meta{display:grid;grid-template-columns:90px 1fr;gap:2px 8px;font-size:12px}
.meta dt{color:#8b949e}
.meta dd{color:#c9d1d9}
.redaction-count{color:#d29922;font-size:12px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1 id="cmd-title">—</h1>
    <span id="exit-badge" class="badge ok">—</span>
  </div>
  <div class="section">
    <dl class="meta">
      <dt>Project</dt><dd id="project">—</dd>
      <dt>CWD</dt><dd id="cwd">—</dd>
      <dt>Duration</dt><dd id="duration">—</dd>
      <dt>Risk</dt><dd id="risk">—</dd>
    </dl>
  </div>
  <div class="section">
    <div class="section-title">stdout</div>
    <pre id="stdout">—</pre>
  </div>
  <div class="section">
    <div class="section-title">stderr</div>
    <pre id="stderr">—</pre>
  </div>
</div>
<script>
function render(data) {
  if (!data) return;
  document.getElementById('cmd-title').textContent = data.command || '—';
  document.getElementById('project').textContent = data.project_id || '—';
  document.getElementById('cwd').textContent = data.cwd || '—';
  document.getElementById('duration').textContent = data.duration_ms != null ? `${data.duration_ms}ms` : '—';
  document.getElementById('risk').textContent = data.risk_level || '—';
  const badge = document.getElementById('exit-badge');
  if (data.exit_code === 0) { badge.textContent = 'OK'; badge.className = 'badge ok'; }
  else if (data.exit_code != null) { badge.textContent = `Exit ${data.exit_code}`; badge.className = 'badge err'; }
  else { badge.textContent = data.status || '—'; badge.className = 'badge err'; }
  document.getElementById('stdout').textContent = data.stdout || '(empty)';
  document.getElementById('stderr').textContent = data.stderr || '(empty)';
}
const TRUSTED_ORIGINS = [window.location.origin, 'https://chatgpt.com', 'https://chat.openai.com'];
window.addEventListener('message', e => {
  if (TRUSTED_ORIGINS.includes(e.origin) && e.data?.type === 'shell-result') render(e.data.payload);
});
const params = new URLSearchParams(location.search);
if (params.get('data')) { try { render(JSON.parse(decodeURIComponent(params.get('data')))); } catch {} }
</script>
</body>
</html>
