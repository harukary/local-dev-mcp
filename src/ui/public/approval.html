<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Approval</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;padding:16px;font-size:14px;line-height:1.5}
h1{font-size:16px;font-weight:600;color:#f0f6fc;margin-bottom:16px}
.field{margin-bottom:12px}
.field-label{font-size:12px;color:#8b949e;margin-bottom:2px}
.field-value{font-size:14px;color:#c9d1d9}
.field-value.cmd{font-family:'SF Mono',Menlo,monospace;background:#161b22;padding:8px 12px;border-radius:6px;border:1px solid #30363d;word-break:break-all}
.risk-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
.risk-forbidden{background:#3a1a1a;color:#f85149}
.risk-destructive{background:#3a2a1a;color:#d29922}
.risk-network{background:#1a2a3a;color:#58a6ff}
.risk-write{background:#2a2a1a;color:#d29922}
.effects{list-style:none;padding:0;font-size:13px}
.effects li{padding:4px 0;color:#8b949e}
.effects li::before{content:'• ';color:#30363d}
.buttons{display:flex;gap:12px;margin-top:20px}
.btn{padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-approve{background:#238636;color:#fff}
.btn-approve:hover{background:#2ea043}
.btn-reject{background:#21262d;border:1px solid #30363d;color:#c9d1d9}
.btn-reject:hover{background:#30363d}
.status{margin-top:12px;font-size:13px;color:#8b949e}
</style>
</head>
<body>
<h1>Approval Required</h1>
<div class="field">
  <div class="field-label">Project</div>
  <div class="field-value" id="project">—</div>
</div>
<div class="field">
  <div class="field-label">Command</div>
  <div class="field-value cmd" id="command">—</div>
</div>
<div class="field">
  <div class="field-label">Purpose</div>
  <div class="field-value" id="purpose">—</div>
</div>
<div class="field">
  <div class="field-label">Risk</div>
  <div id="risk"></div>
</div>
<div class="field">
  <div class="field-label">Expected effects</div>
  <ul id="effects" class="effects"></ul>
</div>
<div class="buttons">
  <button class="btn btn-approve" id="btn-approve">Approve</button>
  <button class="btn btn-reject" id="btn-reject">Reject</button>
</div>
<div id="status" class="status"></div>
<script>
let requestId = null;
let parentOrigin = null;
const TRUSTED_ORIGINS = [window.location.origin, 'https://chatgpt.com', 'https://chat.openai.com'];

function render(data) {
  if (!data) return;
  requestId = data.approval_request_id;
  document.getElementById('project').textContent = data.project_id || '—';
  document.getElementById('command').textContent = data.command || '—';
  document.getElementById('purpose').textContent = data.purpose || '—';
  const risk = data.risk_level || '—';
  const cls = risk.includes('forbidden') ? 'risk-forbidden' : risk.includes('destructive') ? 'risk-destructive' : risk.includes('network') ? 'risk-network' : 'risk-write';
  document.getElementById('risk').innerHTML = `<span class="risk-badge ${cls}">${risk}</span>`;
  if (data.expected_effects?.length) {
    document.getElementById('effects').innerHTML = data.expected_effects.map(e => `<li>${e}</li>`).join('');
  }
}
async function respond(approve) {
  if (!requestId || !parentOrigin) return;
  document.getElementById('status').textContent = approve ? 'Approving...' : 'Rejecting...';
  window.parent.postMessage({ type: 'approval-response', approval_request_id: requestId, approved: approve }, parentOrigin);
}
document.getElementById('btn-approve').onclick = () => respond(true);
document.getElementById('btn-reject').onclick = () => respond(false);
window.addEventListener('message', e => {
  if (TRUSTED_ORIGINS.includes(e.origin) && e.data?.type === 'approval') {
    parentOrigin = e.origin;
    render(e.data.payload);
  }
});
const params = new URLSearchParams(location.search);
if (params.get('data')) { try { render(JSON.parse(decodeURIComponent(params.get('data')))); } catch {} }
</script>
</body>
</html>
